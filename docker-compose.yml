services:
  agent-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - .:/app
      - /app/.venv
      - /app/opgg-mcp/node_modules
      - /app/opgg-mcp/dist
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
