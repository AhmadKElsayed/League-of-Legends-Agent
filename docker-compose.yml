services:
  agent-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
      # --- THE FIX: Anonymous Volumes ---
      # This preserves the internal container folders 
      # and prevents the host from overwriting them.
      - /app/.venv
      - /app/opgg-mcp/node_modules
      - /app/opgg-mcp/dist
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"